name: llvm toolchain
defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Run custom command before building'
        required: false
        type: string
      fresh_build:
        description: 'Ignore cache and rebuild from scratch'
        required: false
        default: false
        type: boolean

jobs:
  build_llvm:
    name: Building LLVM and Clang
    runs-on: ubuntu-latest
    steps:
      - name: Installing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ninja-build cmake automake pkgconf libtool libtool-bin clang llvm lld libc++1 libc++abi1 libgmp-dev libmpfr-dev libmpc-dev libgcrypt-dev libmimalloc-dev python3-pip unzip p7zip-full curl ccache gettext nasm
          pip3 install --break-system-packages meson mako jsonschema

      - name: Setup git config
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase true
          git config --global rebase.autoStash true
          git config --global fetch.prune true
          git config --global --add safe.directory $PWD

      - uses: actions/checkout@main
        with:
          ref: master

      - name: Set cache version
        id: cache_version
        run: echo "value=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Loading clang root
        id: clang_root_cache
        if: ${{ github.event.inputs.fresh_build != 'true' }}
        uses: actions/cache/restore@main
        with:
          path: clang_root
          key: clang_root-${{ steps.cache_version.outputs.value }}-${{ github.run_id }}
          restore-keys: |
            clang_root-${{ steps.cache_version.outputs.value }}
            clang_root-

      - name: Loading x86_64 toolchain
        id: x86_64_cache
        if: ${{ github.event.inputs.fresh_build != 'true' }}
        uses: actions/cache/restore@main
        with:
          path: build_x86_64
          key: clang-x86_64_toolchain-${{ steps.cache_version.outputs.value }}-${{ github.run_id }}
          restore-keys: |
            clang-x86_64_toolchain-${{ steps.cache_version.outputs.value }}
            clang-x86_64_toolchain-

      - name: Loading x86_64-v3 toolchain
        id: v3_cache
        if: ${{ github.event.inputs.fresh_build != 'true' }}
        uses: actions/cache/restore@main
        with:
          path: build_x86_64-v3
          key: clang-v3_toolchain-${{ steps.cache_version.outputs.value }}-${{ github.run_id }}
          restore-keys: |
            clang-v3_toolchain-${{ steps.cache_version.outputs.value }}
            clang-v3_toolchain-

      - name: Loading x86_64-znver3 toolchain
        id: znver3_cache
        if: ${{ github.event.inputs.fresh_build != 'true' }}
        uses: actions/cache/restore@main
        with:
          path: build_x86_64-znver3
          key: clang-znver3_toolchain-${{ steps.cache_version.outputs.value }}-${{ github.run_id }}
          restore-keys: |
            clang-znver3_toolchain-${{ steps.cache_version.outputs.value }}
            clang-znver3_toolchain-

      - name: Running custom command
        if: ${{ github.event.inputs.command != '' }}
        continue-on-error: true
        run: ${{ github.event.inputs.command }}

      - name: Building LLVM with IR Profile Instrumentation
        if: ${{ steps.clang_root_cache.outputs.cache-matched-key == '' }}
        run: |
          cmake -DTARGET_ARCH=x86_64-w64-mingw32 -DLLVM_ENABLE_PGO=GEN -DCOMPILER_TOOLCHAIN=clang -DCMAKE_INSTALL_PREFIX=$PWD/clang_root -DMINGW_INSTALL_PREFIX=$PWD/build_x86_64/x86_64-w64-mingw32 -DSINGLE_SOURCE_LOCATION=$PWD/src_packages -DRUSTUP_LOCATION=$PWD/clang_root/install_rustup -G Ninja -B build_x86_64 -S $PWD
          ninja -C build_x86_64 llvm
          ninja -C build_x86_64 rustup
          ninja -C build_x86_64 cargo-clean

      - name: Building x86_64 toolchain
        if: ${{ steps.x86_64_cache.outputs.cache-matched-key == '' }}
        run: |
          cmake -DTARGET_ARCH=x86_64-w64-mingw32 -DLLVM_ENABLE_PGO=GEN -DCOMPILER_TOOLCHAIN=clang -DCMAKE_INSTALL_PREFIX=$PWD/clang_root -DMINGW_INSTALL_PREFIX=$PWD/build_x86_64/x86_64-w64-mingw32 -DSINGLE_SOURCE_LOCATION=$PWD/src_packages -DRUSTUP_LOCATION=$PWD/clang_root/install_rustup -G Ninja -B build_x86_64 -S $PWD
          ninja -C build_x86_64 llvm-clang

      - name: Building x86_64-v3 toolchain
        if: ${{ steps.v3_cache.outputs.cache-matched-key == '' }}
        run: |
          cmake -DTARGET_ARCH=x86_64-w64-mingw32 -DCOMPILER_TOOLCHAIN=clang -DLLVM_ARCH=x86-64-v3 -DCMAKE_INSTALL_PREFIX=$PWD/clang_root -DMINGW_INSTALL_PREFIX=$PWD/build_x86_64-v3/x86_64-v3-w64-mingw32 -DSINGLE_SOURCE_LOCATION=$PWD/src_packages -DRUSTUP_LOCATION=$PWD/clang_root/install_rustup -G Ninja -B build_x86_64-v3 -S $PWD
          ninja -C build_x86_64-v3 llvm-clang

      - name: Building x86_64-znver3 toolchain
        if: ${{ steps.znver3_cache.outputs.cache-matched-key == '' }}
        run: |
          cmake -DTARGET_ARCH=x86_64-w64-mingw32 -DCOMPILER_TOOLCHAIN=clang -DLLVM_ARCH=znver3 -DCMAKE_INSTALL_PREFIX=$PWD/clang_root -DMINGW_INSTALL_PREFIX=$PWD/build_x86_64-znver3/x86_64-znver3-w64-mingw32 -DSINGLE_SOURCE_LOCATION=$PWD/src_packages -DRUSTUP_LOCATION=$PWD/clang_root/install_rustup -G Ninja -B build_x86_64-znver3 -S $PWD
          ninja -C build_x86_64-znver3 llvm-clang

      - name: PGO training with shaderc
        if: ${{ steps.clang_root_cache.outputs.cache-matched-key == '' }}
        run: |
          cmake -DTARGET_ARCH=x86_64-w64-mingw32 -DLLVM_ENABLE_PGO=GEN -DCLANG_PACKAGES_LTO=ON -DCOMPILER_TOOLCHAIN=clang -DCMAKE_INSTALL_PREFIX=$PWD/clang_root -DMINGW_INSTALL_PREFIX=$PWD/build_x86_64/x86_64-w64-mingw32 -DSINGLE_SOURCE_LOCATION=$PWD/src_packages -DRUSTUP_LOCATION=$PWD/clang_root/install_rustup -G Ninja -B build_x86_64 -S $PWD
          ninja -C build_x86_64 shaderc

      - name: Merging profraw to profdata
        if: ${{ steps.clang_root_cache.outputs.cache-matched-key == '' }}
        run: |
          llvm-profdata merge $PWD/clang_root/profiles/*.profraw -o llvm.profdata
          rm -rf $PWD/clang_root/profiles/* || true

      - name: Building LLVM with PGO
        if: ${{ steps.clang_root_cache.outputs.cache-matched-key == '' }}
        run: |
          cmake -DTARGET_ARCH=x86_64-w64-mingw32 -DLLVM_ENABLE_PGO=USE -DLLVM_PROFDATA_FILE="llvm.profdata" -DCOMPILER_TOOLCHAIN=clang -DCMAKE_INSTALL_PREFIX=$PWD/clang_root -DMINGW_INSTALL_PREFIX=$PWD/build_x86_64/x86_64-w64-mingw32 -DSINGLE_SOURCE_LOCATION=$PWD/src_packages -DRUSTUP_LOCATION=$PWD/clang_root/install_rustup -G Ninja -B build_x86_64 -S $PWD
          ninja -C build_x86_64 llvm

      - name: Cleanup
        run: |
          rm -rf {build_x86_64,build_x86_64-v3,build_x86_64-znver3}/{toolchain,packages} || true

      - name: Collecting logs
        if: always()
        run: |
          mkdir -p llvm-x86_64-logs llvm-x86_64-v3-logs llvm-x86_64-znver3-logs
          cp -fr $(find build_x86_64 -type f -iname "*-*.log") llvm-x86_64-logs || true
          cp -fr $(find build_x86_64-v3 -type f -iname "*-*.log") llvm-x86_64-v3-logs || true
          cp -fr $(find build_x86_64-znver3 -type f -iname "*-*.log") llvm-x86_64-znver3-logs || true

      - name: Uploading x86_64 logs
        uses: actions/upload-artifact@master
        if: always()
        with:
          name: llvm-x86_64-logs
          path: llvm-x86_64-logs
          retention-days: 1

      - name: Uploading x86_64-v3 logs
        uses: actions/upload-artifact@master
        if: always()
        with:
          name: llvm-x86_64-v3-logs
          path: llvm-x86_64-v3-logs
          retention-days: 1

      - name: Uploading x86_64-znver3 logs
        uses: actions/upload-artifact@master
        if: always()
        with:
          name: llvm-x86_64-znver3-logs
          path: llvm-x86_64-znver3-logs
          retention-days: 1

      - name: Uploading toolchain
        uses: actions/upload-artifact@master
        if: always()
        with:
          name: toolchain
          path: clang_root

      - name: Saving clang root
        uses: actions/cache/save@main
        with:
          path: clang_root
          key: clang_root-${{ steps.cache_version.outputs.value }}-${{ github.run_id }}

      - name: Saving x86_64 toolchain
        uses: actions/cache/save@main
        with:
          path: build_x86_64
          key: clang-x86_64_toolchain-${{ steps.cache_version.outputs.value }}-${{ github.run_id }}

      - name: Saving x86_64-v3 toolchain
        uses: actions/cache/save@main
        with:
          path: build_x86_64-v3
          key: clang-v3_toolchain-${{ steps.cache_version.outputs.value }}-${{ github.run_id }}

      - name: Saving x86_64-znver3 toolchain
        uses: actions/cache/save@main
        with:
          path: build_x86_64-znver3
          key: clang-znver3_toolchain-${{ steps.cache_version.outputs.value }}-${{ github.run_id }}

  call_workflow:
    name: Run mpv_clang
    runs-on: ubuntu-latest
    needs: build_llvm
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Run mpv_clang.yml
        run: |
          curl -H "Authorization: Bearer $GH_TOKEN" -X POST -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/sohnyj/minimal-mpv-winbuild/actions/workflows/mpv_clang.yml/dispatches -d @- <<EOF
          {
            "ref": "master",
            "inputs": {
              "github_release": "true"
            }
          }
          EOF
