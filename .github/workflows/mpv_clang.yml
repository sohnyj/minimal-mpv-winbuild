name: mpv clang
defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
    inputs:
      github_release:
        description: 'Upload to Github release'
        required: false
        default: true
        type: boolean

jobs:
  build_mpv:
    name: Building mpv (${{ matrix.llvm_arch }})
    runs-on: ubuntu-latest
    outputs:
      cache_version: ${{ steps.cache_version.outputs.value }}
      clang_version: ${{ steps.source_revisions.outputs.clang_version }}
      mpv_shorthead: ${{ steps.source_revisions.outputs.mpv }}
      ffmpeg_shorthead: ${{ steps.source_revisions.outputs.ffmpeg }}
      libplacebo_shorthead: ${{ steps.source_revisions.outputs.libplacebo }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - llvm_arch: x86-64-v3
            x86_64_level: v3
            clang_flags: ""
          - llvm_arch: znver3
            x86_64_level: znver3
            clang_flags: "-mtune=znver3"
    env:
      BIT: x86_64
      SYSROOT_LEVEL: v3
      BUILD_DIR: build_x86_64-v3
    steps:
      - name: Installing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y automake autopoint build-essential ccache clang cmake curl gettext git libc++-dev libc++1 libc++abi-dev libc++abi1 libgcrypt-dev libgmp-dev libmimalloc-dev libmpc-dev libmpfr-dev libtool libtool-bin lld llvm nasm ninja-build p7zip-full pkgconf python3-jsonschema python3-mako python3-pip unzip
          pip3 install --break-system-packages meson
          curl -sL -o /tmp/glslang.zip https://github.com/KhronosGroup/glslang/releases/download/main-tot/glslang-main-linux-Release.zip
          sudo unzip -oj /tmp/glslang.zip bin/glslang bin/glslangValidator -d /usr/local/bin
          sudo chmod +x /usr/local/bin/glslang /usr/local/bin/glslangValidator
          glslangValidator --version

      - name: Setup git config
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase true
          git config --global rebase.autoStash true
          git config --global fetch.prune true
          git config --global --add safe.directory $PWD

      - uses: actions/checkout@main
        with:
          ref: master

      - name: Set cache version
        id: cache_version
        run: echo "value=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Loading clang toolchain cache
        id: clang_root_cache
        uses: actions/cache/restore@main
        with:
          path: |
            clang_root
          key: clang_root-${{ steps.cache_version.outputs.value }}
          restore-keys: |
            clang_root-

      - name: Deriving toolchain
        id: toolchain_id
        env:
          MATCHED_KEY: ${{ steps.clang_root_cache.outputs.cache-matched-key }}
        run: |
          test -n "$MATCHED_KEY" || exit 1
          echo "value=${MATCHED_KEY#clang_root-}" >> $GITHUB_OUTPUT

      - name: Loading repository cache
        uses: actions/cache/restore@main
        with:
          path: src_packages
          key: repository

      - name: Loading ${{ matrix.x86_64_level }} sysroot cache
        uses: actions/cache/restore@main
        with:
          path: |
            ${{ env.BUILD_DIR }}
          key: sysroot-${{ matrix.x86_64_level }}-${{ steps.toolchain_id.outputs.value }}
          restore-keys: |
            clang-${{ env.SYSROOT_LEVEL }}_toolchain-${{ steps.toolchain_id.outputs.value }}

      - name: Configuring CMake & Downloading source
        run: |
          cmake -DTARGET_ARCH=$BIT-w64-mingw32 -DCOMPILER_TOOLCHAIN=clang -DLLVM_ARCH=${{ matrix.llvm_arch }} -DCMAKE_INSTALL_PREFIX=$PWD/clang_root -DMINGW_INSTALL_PREFIX=$PWD/$BUILD_DIR/$BIT-${{ env.SYSROOT_LEVEL }}-w64-mingw32 -DSINGLE_SOURCE_LOCATION=$PWD/src_packages -DRUSTUP_LOCATION=$PWD/clang_root/install_rustup -DENABLE_CCACHE=ON -DCLANG_PACKAGES_LTO=ON -DCLANG_FLAGS="${{ matrix.clang_flags }}" -G Ninja --fresh -B $BUILD_DIR -S $PWD
          ninja -C $BUILD_DIR download || true

      - name: Building mpv
        run: |
          ninja -C $BUILD_DIR update
          ninja -C $BUILD_DIR mpv

      - name: Packaging mpv
        run: |
          mkdir -p release_${{ matrix.x86_64_level }}
          ninja -C $BUILD_DIR mpv-packaging; mv $BUILD_DIR/mpv*.7z release_${{ matrix.x86_64_level }} || true

      - name: Recording source revisions
        id: source_revisions
        run: |
          clang_version=$(./clang_root/bin/clang -dumpversion)
          mpv_hash=$(git -C src_packages/mpv rev-parse --short HEAD)
          ffmpeg_hash=$(git -C src_packages/ffmpeg rev-parse --short HEAD)
          libplacebo_hash=$(git -C src_packages/libplacebo rev-parse --short HEAD)
          echo "clang_version=$clang_version" >> $GITHUB_OUTPUT
          echo "mpv=$mpv_hash" >> $GITHUB_OUTPUT
          echo "ffmpeg=$ffmpeg_hash" >> $GITHUB_OUTPUT
          echo "libplacebo=$libplacebo_hash" >> $GITHUB_OUTPUT

      - name: Copying ffmpeg
        run: |
          7z a -m0=lzma2 -mx=9 -ms=on release_${{ matrix.x86_64_level }}/ffmpeg-$BIT-${{ matrix.x86_64_level }}-git-${{ steps.source_revisions.outputs.ffmpeg }}.7z ./$BUILD_DIR/$BIT-${{ env.SYSROOT_LEVEL }}-w64-mingw32/bin/ffmpeg.exe

      - name: Collecting logs
        if: always()
        env:
          LOGS_DIR: mpv-x86_64-${{ matrix.x86_64_level }}-logs
        run: |
          mkdir -p "$LOGS_DIR"
          cp -fr $(find $BUILD_DIR -type f -iname "*-*.log" -or -wholename "*/ffbuild/config.log") "$LOGS_DIR" || true

      - name: Uploading logs
        uses: actions/upload-artifact@master
        if: always()
        with:
          name: mpv-x86_64-${{ matrix.x86_64_level }}-logs
          path: mpv-x86_64-${{ matrix.x86_64_level }}-logs
          retention-days: 1

      - name: Uploading x86_64-${{ matrix.x86_64_level }} build
        uses: actions/upload-artifact@master
        with:
          name: mpv-x86_64-${{ matrix.x86_64_level }}
          path: release_${{ matrix.x86_64_level }}/mpv-${{ env.BIT }}*

      - name: Cleaning build directory
        if: always()
        run: |
          rm -rf $BUILD_DIR/mpv*
          ninja -C $BUILD_DIR mpv-fullclean

      - name: Cleaning rust toolchain directory
        if: always()
        run: |
          ninja -C $BUILD_DIR cargo-clean

      - name: Deleting stale incremental caches
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SYSROOT_PREFIX: sysroot-${{ matrix.x86_64_level }}-
        run: |
          if [ "${{ matrix.x86_64_level }}" = "${{ env.SYSROOT_LEVEL }}" ]; then
            gh cache delete "repository" --repo "$REPO" || true
          fi
          for key in $(gh cache list --repo "$REPO" --key "$SYSROOT_PREFIX" --json key --limit 100 --jq '.[].key'); do
            gh cache delete "$key" --repo "$REPO" || true
          done

      - name: Saving repository cache
        uses: actions/cache/save@main
        if: ${{ always() && matrix.x86_64_level == env.SYSROOT_LEVEL }}
        with:
          path: src_packages
          key: repository

      - name: Saving ${{ matrix.x86_64_level }} sysroot cache
        uses: actions/cache/save@main
        if: always()
        with:
          path: |
            ${{ env.BUILD_DIR }}
          key: sysroot-${{ matrix.x86_64_level }}-${{ steps.toolchain_id.outputs.value }}

      - name: Saving release cache
        uses: actions/cache/save@main
        with:
          path: release_${{ matrix.x86_64_level }}
          key: release_${{ matrix.x86_64_level }}-${{ steps.cache_version.outputs.value }}-${{ github.run_id }}

  release:
    name: Upload releases
    runs-on: ubuntu-latest
    needs: build_mpv
    env:
      GH_TOKEN: ${{ github.token }}
      CURL_RETRIES: "--connect-timeout 60 --retry 999 --retry-delay 5 --retry-all-errors"
      RELEASE_V3_KEY: release_v3-${{ needs.build_mpv.outputs.cache_version }}-${{ github.run_id }}
      RELEASE_ZNVER3_KEY: release_znver3-${{ needs.build_mpv.outputs.cache_version }}-${{ github.run_id }}
    steps:
      - name: Installing dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          git config --global pull.rebase true
          git config --global fetch.prune true

      - uses: actions/checkout@main
        with:
          ref: master

      - name: Loading release_x86_64-v3 cache
        uses: actions/cache/restore@main
        with:
          path: release_v3
          key: ${{ env.RELEASE_V3_KEY }}

      - name: Loading release_x86_64-znver3 cache
        uses: actions/cache/restore@main
        with:
          path: release_znver3
          key: ${{ env.RELEASE_ZNVER3_KEY }}

      - name: Moving archives
        run: |
          mkdir -p release
          mv release_v3/* release || true
          mv release_znver3/* release || true
          du -ah release/*

      - name: Uploading packages to Github release
        id: upload_packages_gh
        if: ${{ github.event.inputs.github_release == 'true' }}
        continue-on-error: true
        run: |
          tag=$(date "+%Y%m%d-%H%M%S")-$(git rev-parse --short HEAD)
          name=$(date "+%Y-%m-%d %H:%M")
          body=$(cat <<END
          **LLVM/Clang**: ${{ needs.build_mpv.outputs.clang_version }}
          **mpv**: [${{ needs.build_mpv.outputs.mpv_shorthead }}](https://github.com/mpv-player/mpv/commit/${{ needs.build_mpv.outputs.mpv_shorthead }})
          **FFmpeg**: [${{ needs.build_mpv.outputs.ffmpeg_shorthead }}](https://github.com/FFmpeg/FFmpeg/commit/${{ needs.build_mpv.outputs.ffmpeg_shorthead }})
          **libplacebo**: [${{ needs.build_mpv.outputs.libplacebo_shorthead }}](https://github.com/haasn/libplacebo/commit/${{ needs.build_mpv.outputs.libplacebo_shorthead }})
          **Workflow**: [$GITHUB_RUN_ID]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)
          END
          )
          id=$(curl -H "Authorization: Bearer $GH_TOKEN" $CURL_RETRIES --fail-with-body -s -X POST -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/sohnyj/minimal-mpv-winbuild/releases -d @- <<END | jq -r '.id'
          {
            "tag_name": "$tag",
            "name": "$name",
            "body": "$(echo ${body//$'\n'/'\n'})"
          }
          END
          )
          for file in release/*.7z; do curl -H "Authorization: Bearer $GH_TOKEN" $CURL_RETRIES --fail-with-body -X POST -H "Accept: application/vnd.github.v3+json" -H "Content-Type: $(file -b --mime-type $file)" https://uploads.github.com/repos/sohnyj/minimal-mpv-winbuild/releases/$id/assets?name=$(basename $file) --data-binary @$file; done

      - name: Pruning tags
        continue-on-error: true
        run: |
          # Keep latest 30 tags/releases
          git fetch --tags
          tag_list=($(git tag | sort -rV))
          old=${tag_list[@]:30}
          for tag in ${old[@]}; do
            id=$(curl -H "Authorization: Bearer $GH_TOKEN" $CURL_RETRIES -s -X GET -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/sohnyj/minimal-mpv-winbuild/releases/tags/$tag | jq -r '.id')
            curl -H "Authorization: Bearer $GH_TOKEN" $CURL_RETRIES -s -X DELETE -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/sohnyj/minimal-mpv-winbuild/releases/$id
            git tag -d $tag
          done
          git push --tags --prune https://sohnyj:$GH_TOKEN@github.com/sohnyj/minimal-mpv-winbuild

      - name: Delete releases cache
        if: ${{ github.event.inputs.github_release == 'false' || steps.upload_packages_gh.outcome == 'success' }}
        run: |
          curl -H "Authorization: Bearer $GH_TOKEN" $CURL_RETRIES -s -o /dev/null -X DELETE -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/sohnyj/minimal-mpv-winbuild/actions/caches?key=$RELEASE_V3_KEY
          curl -H "Authorization: Bearer $GH_TOKEN" $CURL_RETRIES -s -o /dev/null -X DELETE -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/sohnyj/minimal-mpv-winbuild/actions/caches?key=$RELEASE_ZNVER3_KEY
